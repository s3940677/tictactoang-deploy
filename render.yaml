services:
  # Backend API — Web Service (Node)
  - type: web
    name: tictactoang-deploy
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production

  # Frontend — Static Site (React SPA)
  - type: web
    name: tictactoang-deploy-1
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
